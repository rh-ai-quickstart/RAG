{{ if .Values.rag -}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rag
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
{{- $userCount := int .Values.user.count }}
{{- range $index := until $userCount }}
      - user: {{ $.Values.user.prefix }}{{ add $index 1}}
{{- end }}
  template:
    metadata:
      name: rag-{{- "{{" }} user {{- " }}" }}
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: {{ .Values.rag.git.url }}
        targetRevision: {{ .Values.rag.git.revision }}
        path: {{ .Values.rag.git.path }}
        helm:
          values: |
            llm-service:
              secret:
                hf_token: {{ .Values.rag.huggingFaceToken | quote }}
            llama-stack:
              secrets:
                TAVILY_SEARCH_API_KEY: {{ .Values.rag.tavilySearchApiKey | quote }}
            global:
              models:
                remotellm:
                  enabled: {{ .Values.rag.remotellm.enabled | quote }}
                  apiToken: {{ .Values.rag.remotellm.apiToken | quote }}
                  url: {{ .Values.rag.remotellm.url | quote }}
                  id: {{ .Values.rag.remotellm.id | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .Values.rag.namespace }}-{{- "{{" }} user {{- " }}" }}-{{ .Values.guid }}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: false
        retry:
          limit: 30
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "5m"
{{- end }}