# Local pipeline development: copy to Chart.yaml (see Makefile rag-deps-use-local-pipelines).
#
# Expects ai-architecture-charts as a sibling of the RAG repo (same parent directory), e.g.:
#   .../forks/RAG
#   .../forks/ai-architecture-charts
#
# The file:// paths are relative to this chart directory (deploy/helm/rag).
# If helm dependency update complains about versions, align the two version: lines below
# with the "version:" field in:
#   ai-architecture-charts/configure-pipeline/helm/Chart.yaml
#   ai-architecture-charts/ingestion-pipeline/helm/Chart.yaml

apiVersion: v2
name: rag
description: A Helm chart for Kubernetes
type: application
version: 0.2.43
appVersion: "0.2.43"

dependencies:
  - name: pgvector
    version: 0.5.5
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
    condition: pgvector.enabled
  - name: llm-service
    version: 0.5.9
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
    condition: llm-service.enabled
  - name: configure-pipeline
    version: 0.5.6
    repository: "file://../../../../ai-architecture-charts/configure-pipeline/helm"
    condition: configure-pipeline.enabled
  - name: ingestion-pipeline
    version: 0.7.2
    repository: "file://../../../../ai-architecture-charts/ingestion-pipeline/helm"
    condition: ingestion-pipeline.enabled
  - name: llama-stack
    version: 0.7.3
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
    condition: llama-stack.enabled
  - name: mcp-servers
    version: 0.5.15
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
    condition: mcp-servers.enabled
